version: 2

project_name: brabble

builds:
  - id: brabble
    main: ./cmd/brabble
    binary: brabble
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-I/usr/local/opt/whisper/include
      - CGO_LDFLAGS=-L/usr/local/opt/whisper/lib
    goos:
      - darwin
    goarch:
      - arm64
    hooks:
      post:
        - install_name_tool -add_rpath /usr/local/opt/whisper/lib "{{ .Path }}" || true

archives:
  - ids:
      - brabble
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
