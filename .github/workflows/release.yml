name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: |
          brew install cmake portaudio

      - name: Build whisper.cpp (headers + dylibs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          binding_version="$(go list -m -f '{{.Version}}' github.com/ggerganov/whisper.cpp/bindings/go)"
          binding_ref="${binding_version##*-}"
          if [[ -f WHISPER_CPP_REF ]]; then
            whisper_cpp_ref="$(tr -d '\n' < WHISPER_CPP_REF)"
            test "$binding_ref" = "${whisper_cpp_ref:0:12}"
          else
            whisper_cpp_ref="$(gh api "repos/ggml-org/whisper.cpp/commits/$binding_ref" --jq .sha)"
          fi
          git init /tmp/whisper.cpp-build
          git -C /tmp/whisper.cpp-build remote add origin https://github.com/ggml-org/whisper.cpp.git
          git -C /tmp/whisper.cpp-build fetch --depth 1 origin "$whisper_cpp_ref"
          git -C /tmp/whisper.cpp-build checkout --detach FETCH_HEAD
          cmake -S /tmp/whisper.cpp-build -B /tmp/whisper.cpp-build/build \
            -DGGML_METAL=ON \
            -DGGML_BLAS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF
          cmake --build /tmp/whisper.cpp-build/build --parallel
          sudo cmake --install /tmp/whisper.cpp-build/build --prefix /usr/local/opt/whisper

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          awk -v prefix="## [$version]" '
            index($0, prefix) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > /tmp/release-notes.md
          test -s /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean --config /tmp/.goreleaser.yaml --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
