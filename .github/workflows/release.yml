name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: |
          brew install cmake portaudio

      - name: Build whisper.cpp (headers + dylibs)
        env:
          WHISPER_CPP_REF: df7638d8229a243af8a4b5a8ae557e0d74e0a0ae
        run: |
          git init /tmp/whisper.cpp-build
          git -C /tmp/whisper.cpp-build remote add origin https://github.com/ggml-org/whisper.cpp.git
          git -C /tmp/whisper.cpp-build fetch --depth 1 origin "$WHISPER_CPP_REF"
          git -C /tmp/whisper.cpp-build checkout --detach FETCH_HEAD
          cmake -S /tmp/whisper.cpp-build -B /tmp/whisper.cpp-build/build -DGGML_METAL=ON -DGGML_BLAS=ON -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/whisper.cpp-build/build --target whisper

          sudo mkdir -p /usr/local/lib/whisper /usr/local/include/whisper
          sudo cp /tmp/whisper.cpp-build/build/src/libwhisper*.dylib /usr/local/lib/whisper/
          sudo cp /tmp/whisper.cpp-build/build/ggml/src/libggml*.dylib /usr/local/lib/whisper/ || true
          sudo cp /tmp/whisper.cpp-build/build/ggml/src/ggml-metal/libggml-metal*.dylib /usr/local/lib/whisper/ || true
          sudo cp /tmp/whisper.cpp-build/build/ggml/src/ggml-blas/libggml-blas*.dylib /usr/local/lib/whisper/ || true
          sudo cp -R /tmp/whisper.cpp-build/include/* /usr/local/include/whisper/
          sudo cp -R /tmp/whisper.cpp-build/ggml/include/* /usr/local/include/whisper/ || true

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout ${{ inputs.tag }}

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          awk -v prefix="## [$version]" '
            index($0, prefix) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > /tmp/release-notes.md
          test -s /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean --config /tmp/.goreleaser.yaml --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
